<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>員工打卡系統 — 儀表板</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <!-- 導覽列 -->
  <nav class="navbar">
    <a href="/dashboard.html" class="navbar__brand">員工打卡系統</a>
    <div class="navbar__user">
      <span id="user-name"></span>
      <a href="/admin.html" id="admin-link" class="btn btn--sm btn--outline" style="display:none;">管理後台</a>
      <button class="btn btn--sm btn--outline" onclick="document.getElementById('pw-modal').style.display='flex'">修改密碼</button>
      <button class="btn btn--sm btn--outline" onclick="Auth.logout()">登出</button>
    </div>
  </nav>

  <div class="container">
    <!-- 即時時鐘 -->
    <div class="live-clock">
      <div class="live-clock__time" id="live-time">--:--:--</div>
      <div class="live-clock__date" id="live-date"></div>
    </div>

    <!-- 薪資資訊 -->
    <div class="card" id="salary-info" style="display:none;">
      <div class="status-grid">
        <div class="status-item">
          <span class="status-label">薪資類型</span>
          <span class="status-value" id="my-salary-type" style="font-size:1.125rem;">--</span>
        </div>
        <div class="status-item">
          <span class="status-label">薪資</span>
          <span class="status-value" id="my-salary" style="font-size:1.125rem; color:var(--color-primary);">--</span>
        </div>
      </div>
    </div>

    <!-- 打卡按鈕 -->
    <div class="clock-actions">
      <button
        id="btn-clock-in"
        class="btn btn--success clock-btn"
        onclick="Clock.clockIn(this)"
        disabled
      >
        打卡上班
      </button>
      <button
        id="btn-clock-out"
        class="btn btn--primary clock-btn"
        onclick="Clock.clockOut(this)"
        disabled
      >
        打卡下班
      </button>
    </div>

    <!-- 今日打卡狀態 -->
    <div class="card">
      <h2 class="card__title">今日打卡紀錄</h2>
      <div id="today-record">
        <p class="text-muted">載入中...</p>
      </div>
    </div>

    <!-- 歷史紀錄 -->
    <div class="card">
      <h2 class="card__title">歷史紀錄</h2>
      <div class="filter-bar">
        <div class="form-group">
          <label for="filter-start">開始日期</label>
          <input type="date" id="filter-start" class="form-control" />
        </div>
        <div class="form-group">
          <label for="filter-end">結束日期</label>
          <input type="date" id="filter-end" class="form-control" />
        </div>
        <button class="btn btn--outline" onclick="Records.loadHistory()">查詢</button>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>日期</th>
              <th>上班時間</th>
              <th>下班時間</th>
              <th>工作時長</th>
            </tr>
          </thead>
          <tbody id="history-tbody">
            <tr><td colspan="4" class="text-center text-muted">請選擇日期範圍後查詢</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 修改密碼彈窗 -->
  <div id="pw-modal" class="modal" style="display:none;">
    <div class="modal__overlay" onclick="document.getElementById('pw-modal').style.display='none'"></div>
    <div class="modal__content card">
      <h2 class="card__title">修改密碼</h2>
      <div class="form-group">
        <label for="pw-current">目前密碼</label>
        <input type="password" id="pw-current" class="form-control" placeholder="請輸入目前密碼" />
      </div>
      <div class="form-group">
        <label for="pw-new">新密碼</label>
        <input type="password" id="pw-new" class="form-control" placeholder="至少 6 個字元" minlength="6" />
      </div>
      <div class="form-group">
        <label for="pw-confirm">確認新密碼</label>
        <input type="password" id="pw-confirm" class="form-control" placeholder="再次輸入新密碼" />
      </div>
      <div class="btn-group" style="margin-top:1rem;">
        <button class="btn btn--primary" onclick="changePassword()">確認修改</button>
        <button class="btn btn--outline" onclick="document.getElementById('pw-modal').style.display='none'">取消</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/clock.js"></script>
  <script src="/js/records.js"></script>
  <script>
    function updateClock() {
      const now = new Date();
      document.getElementById("live-time").textContent = now.toLocaleTimeString("zh-TW", {
        hour: "2-digit", minute: "2-digit", second: "2-digit",
      });
      document.getElementById("live-date").textContent = now.toLocaleDateString("zh-TW", {
        year: "numeric", month: "long", day: "numeric", weekday: "long",
      });
    }

    updateClock();
    setInterval(updateClock, 1000);

    async function changePassword() {
      const current = document.getElementById("pw-current").value;
      const newPw = document.getElementById("pw-new").value;
      const confirm = document.getElementById("pw-confirm").value;

      if (!current || !newPw || !confirm) {
        Utils.showToast("請填寫所有欄位", "error");
        return;
      }
      if (newPw.length < 6) {
        Utils.showToast("新密碼至少需要 6 個字元", "error");
        return;
      }
      if (newPw !== confirm) {
        Utils.showToast("兩次輸入的新密碼不一致", "error");
        return;
      }

      try {
        const user = firebaseAuth.currentUser;
        const credential = firebase.auth.EmailAuthProvider.credential(user.email, current);
        await user.reauthenticateWithCredential(credential);
        await user.updatePassword(newPw);
        Utils.showToast("密碼修改成功", "success");
        document.getElementById("pw-modal").style.display = "none";
        document.getElementById("pw-current").value = "";
        document.getElementById("pw-new").value = "";
        document.getElementById("pw-confirm").value = "";
      } catch (err) {
        if (err.code === "auth/wrong-password" || err.code === "auth/invalid-credential") {
          Utils.showToast("目前密碼不正確", "error");
        } else {
          Utils.showToast("修改失敗：" + err.message, "error");
        }
      }
    }

    const defaultStart = new Date();
    defaultStart.setDate(defaultStart.getDate() - 7);
    document.getElementById("filter-start").value = defaultStart.toISOString().split("T")[0];
    document.getElementById("filter-end").value = new Date().toISOString().split("T")[0];

    Auth.onAuthStateChanged(async (user) => {
      if (!user) {
        window.location.href = "/";
        return;
      }

      try {
        const role = await Auth.getCurrentRole();
        if (role === "admin") {
          window.location.href = "/admin.html";
          return;
        }
      } catch {}

      document.getElementById("user-name").textContent = user.displayName || user.email;
      await Records.loadToday();

      try {
        const profileData = await Utils.apiRequest("/my_profile");
        const p = profileData.profile;
        const salaryCard = document.getElementById("salary-info");
        const typeEl = document.getElementById("my-salary-type");
        const salaryEl = document.getElementById("my-salary");

        typeEl.textContent = p.salary_type === "part_time" ? "工讀生（時薪）" : "正職（月薪）";
        if (p.salary_type === "part_time") {
          salaryEl.textContent = "$" + Number(p.hourly_rate || 0).toLocaleString() + " / 時";
        } else {
          salaryEl.textContent = "$" + Number(p.monthly_salary || 0).toLocaleString() + " / 月";
        }
        salaryCard.style.display = "";
      } catch {}
    });
  </script>
</body>
</html>
