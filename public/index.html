<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>員工打卡系統 — 登入</title>
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin />
  <link rel="dns-prefetch" href="https://www.gstatic.com" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="page-center">
    <div class="card login-card">
      <div class="login-card__logo">
        <h1>員工打卡系統</h1>
        <p>請登入您的帳號</p>
      </div>

      <form id="login-form">
        <div class="form-group">
          <label for="username">姓名</label>
          <input
            type="text"
            id="username"
            class="form-control"
            placeholder="請輸入姓名"
            required
          />
        </div>
        <div class="form-group">
          <label for="password">密碼</label>
          <input
            type="password"
            id="password"
            class="form-control"
            placeholder="請輸入密碼"
            required
          />
        </div>
        <p id="login-error" class="error-msg"></p>
        <button type="submit" id="btn-login" class="btn btn--primary btn--full btn--lg">
          登入
        </button>
      </form>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    Auth.onAuthStateChanged((user) => {
      if (user) {
        window.location.href = "/dashboard.html";
      }
    });

    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("btn-login");
      const errorEl = document.getElementById("login-error");

      Utils.setLoading(btn, true);
      errorEl.classList.remove("error-msg--visible");

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const email = username.includes("@") ? username : username + "@clock.internal";

      try {
        await Auth.login(email, password);
      } catch (err) {
        let msg = "登入失敗";
        if (err.code === "auth/user-not-found" || err.code === "auth/wrong-password"
            || err.code === "auth/invalid-credential") {
          msg = "姓名或密碼錯誤";
        } else if (err.code === "auth/too-many-requests") {
          msg = "嘗試次數過多，請稍後再試";
        }
        errorEl.textContent = msg;
        errorEl.classList.add("error-msg--visible");
        Utils.setLoading(btn, false);
      }
    });
  </script>
</body>
</html>
