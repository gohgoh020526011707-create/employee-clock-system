<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>員工打卡系統 — 管理後台</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <!-- 導覽列 -->
  <nav class="navbar">
    <a href="/dashboard.html" class="navbar__brand">員工打卡系統</a>
    <div class="navbar__user">
      <span id="user-name"></span>
      <a href="/dashboard.html" class="btn btn--sm btn--outline">回到打卡</a>
      <button class="btn btn--sm btn--outline" onclick="Auth.logout()">登出</button>
    </div>
  </nav>

  <div class="container">
    <!-- Tab 導覽 -->
    <div class="tabs" id="admin-tabs">
      <button class="tab tab--active" data-tab="employees">員工管理</button>
      <button class="tab" data-tab="ip-settings">IP 白名單</button>
      <button class="tab" data-tab="records">出勤查詢</button>
    </div>

    <!-- Tab: 員工管理 -->
    <div id="panel-employees" class="tab-panel tab-panel--active">
      <div class="card">
        <h2 class="card__title">新增員工</h2>
        <form id="add-employee-form">
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.75rem;">
            <div class="form-group">
              <label for="emp-name">姓名 *</label>
              <input type="text" id="emp-name" name="name" class="form-control" required />
            </div>
            <div class="form-group">
              <label for="emp-email">電子郵件 *</label>
              <input type="email" id="emp-email" name="email" class="form-control" required />
            </div>
            <div class="form-group">
              <label for="emp-password">初始密碼 *</label>
              <input type="text" id="emp-password" name="password" class="form-control" required minlength="6" />
            </div>
            <div class="form-group">
              <label for="emp-dept">部門</label>
              <input type="text" id="emp-dept" name="department" class="form-control" />
            </div>
            <div class="form-group">
              <label for="emp-role">角色</label>
              <select id="emp-role" name="role" class="form-control">
                <option value="employee">員工</option>
                <option value="admin">管理員</option>
              </select>
            </div>
          </div>
          <div style="margin-top:1rem;">
            <button type="submit" class="btn btn--primary">新增員工</button>
          </div>
        </form>
      </div>

      <div class="card">
        <h2 class="card__title">員工列表</h2>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>姓名</th>
                <th>電子郵件</th>
                <th>部門</th>
                <th>角色</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="employees-tbody">
              <tr><td colspan="5" class="text-center text-muted">載入中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Tab: IP 白名單 -->
    <div id="panel-ip-settings" class="tab-panel">
      <div class="card">
        <h2 class="card__title">允許的 WiFi IP 位址</h2>
        <p style="margin-bottom:1rem; color:var(--color-gray-500); font-size:0.875rem;">
          僅允許從以下 IP 打卡，每行一個 IP 位址。員工必須連接公司 WiFi 才能打卡。
        </p>
        <div class="form-group">
          <label for="ip-input">IP 白名單</label>
          <textarea id="ip-input" class="form-control" rows="5" placeholder="例如：&#10;203.0.113.10&#10;198.51.100.20"></textarea>
        </div>
        <div class="btn-group">
          <button class="btn btn--primary" onclick="Admin.saveIPSettings()">儲存設定</button>
        </div>
        <div style="margin-top:1.5rem;">
          <h3 style="font-size:0.9375rem; font-weight:600; color:var(--color-gray-700); margin-bottom:0.75rem;">目前設定的 IP</h3>
          <div id="ip-list">
            <p class="text-muted">載入中...</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Tab: 出勤查詢 -->
    <div id="panel-records" class="tab-panel">
      <div class="card">
        <h2 class="card__title">員工出勤紀錄查詢</h2>
        <div class="filter-bar">
          <div class="form-group">
            <label for="query-employee">選擇員工</label>
            <select id="query-employee" class="form-control">
              <option value="">載入中...</option>
            </select>
          </div>
          <div class="form-group">
            <label for="query-start">開始日期</label>
            <input type="date" id="query-start" class="form-control" />
          </div>
          <div class="form-group">
            <label for="query-end">結束日期</label>
            <input type="date" id="query-end" class="form-control" />
          </div>
          <button class="btn btn--primary" onclick="Admin.queryEmployeeRecords()">查詢</button>
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>日期</th>
                <th>上班時間</th>
                <th>下班時間</th>
                <th>IP 位址</th>
              </tr>
            </thead>
            <tbody id="admin-records-tbody">
              <tr><td colspan="4" class="text-center text-muted">請選擇員工後查詢</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/admin.js"></script>
  <script>
    /* Tab 切換 */
    document.getElementById("admin-tabs").addEventListener("click", (e) => {
      const btn = e.target.closest(".tab");
      if (!btn) return;

      document.querySelectorAll(".tab").forEach((t) => t.classList.remove("tab--active"));
      document.querySelectorAll(".tab-panel").forEach((p) => p.classList.remove("tab-panel--active"));

      btn.classList.add("tab--active");
      document.getElementById(`panel-${btn.dataset.tab}`).classList.add("tab-panel--active");
    });

    /* 新增員工表單 */
    document.getElementById("add-employee-form").addEventListener("submit", (e) => {
      e.preventDefault();
      Admin.addEmployee(e.target);
    });

    /* 認證檢查 & 初始化 */
    Auth.onAuthStateChanged(async (user) => {
      if (!user) {
        window.location.href = "/";
        return;
      }

      document.getElementById("user-name").textContent = user.displayName || user.email;

      try {
        await Admin.loadEmployees();
        await Admin.loadIPSettings();
        await Admin.populateEmployeeSelect();
      } catch (err) {
        Utils.showToast("權限不足或載入失敗", "error");
        setTimeout(() => (window.location.href = "/dashboard.html"), 1500);
      }
    });
  </script>
</body>
</html>
